<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOCC 座位表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@700&display=swap');

:root {
  --bg:    #eef1f7;
  --panel: #ffffff;
  --p2:    #f5f7fa;
  --bd:    #d4dae8;
  --bd2:   #aab0c4;
  --tx:    #1a2236;
  --tx2:   #64748b;
  --acc:   #2563eb;

  --c1:#16a34a; --c2:#c026d3; --c3:#2563eb;
  --c4:#ea580c; --c5:#7c3aed; --c6:#ca8a04;
  --c7:#0891b2; --c8:#94a3b8;

  --cw: 90px;
  --ch: 60px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--tx); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ── TOP BAR ── */
.top { background:var(--panel); border-bottom:1px solid var(--bd); padding:7px 14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; flex-shrink:0; }
.logo { font-family:'Space Mono',monospace; font-size:13px; color:var(--acc); letter-spacing:2px; font-weight:700; }
.ftabs { display:flex; gap:3px; }
.ftab { padding:4px 14px; border-radius:6px; border:1px solid var(--bd); background:var(--p2); color:var(--tx2); cursor:pointer; font-family:'Space Mono',monospace; font-size:11px; font-weight:700; transition:all .12s; }
.ftab.on { background:var(--acc); border-color:var(--acc); color:#fff; }
.ftab:hover:not(.on) { border-color:var(--bd2); color:var(--tx); }
.sbox { position:relative; flex:1; min-width:150px; max-width:280px; }
.sbox svg { position:absolute; left:8px; top:50%; transform:translateY(-50%); color:var(--tx2); pointer-events:none; }
.sbox input { width:100%; background:var(--p2); border:1px solid var(--bd); border-radius:6px; padding:5px 9px 5px 28px; font-family:'Noto Sans TC',sans-serif; font-size:11px; color:var(--tx); outline:none; }
.sbox input:focus { border-color:var(--acc); }
.sbox input::placeholder { color:var(--tx2); }
.btns { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.btn { padding:4px 11px; border:1px solid var(--bd); border-radius:5px; background:var(--p2); color:var(--tx); font-size:11px; font-family:'Noto Sans TC',sans-serif; cursor:pointer; white-space:nowrap; transition:all .12s; }
.btn:hover { background:var(--bg); border-color:var(--bd2); }
.btn:disabled { opacity:.3; cursor:not-allowed; }
.zrow { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--tx2); }
.zrow input[type=range] { width:70px; accent-color:var(--acc); }
.badge { background:var(--p2); border:1px solid var(--bd); border-radius:4px; padding:3px 8px; font-size:10px; color:var(--tx2); }

/* ── LEGEND ── */
.legbar { background:var(--panel); border-bottom:1px solid var(--bd); padding:4px 14px; display:flex; gap:5px; flex-wrap:wrap; align-items:center; flex-shrink:0; }
.ll { font-size:10px; color:var(--tx2); }
.lchip { display:flex; align-items:center; gap:3px; padding:2px 8px; border-radius:4px; border:1px solid transparent; background:var(--p2); cursor:pointer; font-size:10px; white-space:nowrap; transition:all .1s; }
.lchip:hover { border-color:var(--bd); }
.lchip.on { border-color:var(--bd2); background:var(--bg); }
.lchip .dot { width:7px; height:7px; border-radius:50%; }
.lchip .n { color:var(--tx2); }

/* ── CANVAS ── */
#outer { flex:1; overflow:auto; padding:18px 24px 18px 100px; }
#wrap  { transform-origin:top left; }
#cv    { position:relative; }



/* ── AISLE DIVIDER within row ── */
.row-aisle {
  position:absolute;
  width:4px; 
  border-radius:2px;
  background: repeating-linear-gradient(to bottom, var(--bd2) 0px, var(--bd2) 4px, transparent 4px, transparent 8px);
  opacity: 0.5;
}

/* ── SEAT ── */
.seat { position:absolute; width:var(--cw); height:var(--ch); background:var(--panel); border:1px solid var(--bd); border-radius:7px; cursor:grab; overflow:hidden; display:flex; flex-direction:column; justify-content:center; padding:4px 7px 4px 9px; transition:box-shadow .12s, border-color .12s; }
.seat:hover { border-color:var(--bd2); box-shadow:0 2px 8px rgba(0,0,0,.1); z-index:5; }
.seat .bar { position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:7px 0 0 7px; }
.seat .zh { font-size:10px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.seat .en { font-size:8.5px; color:var(--tx2); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.seat.new-hire { background:#fafbfe; border-style:dashed; border-color:var(--bd2); }
.seat.new-hire .zh { color:var(--tx2); font-style:italic; }
.seat .ebtn { position:absolute; top:2px; right:2px; width:14px; height:14px; background:var(--p2); border:1px solid var(--bd); border-radius:3px; cursor:pointer; font-size:8px; color:var(--tx2); display:none; align-items:center; justify-content:center; }
.seat:hover .ebtn { display:flex; }
.seat .ebtn:hover { background:var(--acc); color:#fff; border-color:var(--acc); }

.seat.dragging { opacity:.25; transform:scale(.93); }
.seat.drag-over { border-color:var(--acc)!important; box-shadow:0 0 0 2px rgba(37,99,235,.25)!important; z-index:20; }
.seat.hl { border-color:#f59e0b!important; box-shadow:0 0 0 2px rgba(245,158,11,.2)!important; z-index:5; }
.seat.dim { opacity:.13; }

/* ── EMPTY SLOT ── */
.eslot { position:absolute; width:var(--cw); height:var(--ch); border-radius:7px; border:1.5px dashed var(--bd); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; transition:border-color .12s, background .12s; }
.eslot:hover { border-color:var(--acc); background:rgba(37,99,235,.05); }
.eslot:hover .ep { color:var(--acc); }
.eslot:hover .el { color:var(--acc); opacity:.8; }
.eslot .ep { font-size:14px; color:var(--bd); line-height:1; }
.eslot .el { font-size:7.5px; color:var(--tx2); opacity:.55; }
.eslot.drag-over { border-color:var(--acc); background:rgba(37,99,235,.04); }

/* ── PILLAR ── */
.pillar { position:absolute; width:var(--cw); height:var(--ch); background:#e6eaf1; border:2px dashed #c0c9da; border-radius:6px; display:flex; align-items:center; justify-content:center; }
.pillar span { font-size:9px; color:#a0aab6; letter-spacing:2px; writing-mode:vertical-rl; }

/* ── STRUCTURAL ── */
.aisle-band { position:absolute; left:0; right:0; background:var(--bg); border-top:1px dashed var(--bd); border-bottom:1px dashed var(--bd); display:flex; align-items:center; padding-left:12px; }
.aisle-band span { font-size:9px; color:var(--tx2); letter-spacing:4px; opacity:.7; font-family:'Space Mono',monospace; }

/* ── MODAL ── */
.ov { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; display:none; align-items:center; justify-content:center; }
.ov.open { display:flex; }
.modal { background:var(--panel); border:1px solid var(--bd2); border-radius:12px; padding:20px; width:350px; max-width:95vw; box-shadow:0 14px 40px rgba(0,0,0,.18); }
.modal h3 { font-size:13px; font-weight:700; margin-bottom:12px; }
.mf { margin-bottom:10px; }
.ml { font-size:10px; color:var(--tx2); margin-bottom:3px; }
.mi { width:100%; background:var(--p2); border:1px solid var(--bd); border-radius:6px; padding:6px 8px; font-family:'Noto Sans TC',sans-serif; font-size:12px; color:var(--tx); outline:none; }
.mi:focus { border-color:var(--acc); }
.dcs { display:flex; flex-wrap:wrap; gap:4px; margin-top:3px; }
.dc { padding:3px 9px; border-radius:4px; border:1.5px solid var(--bd); background:var(--p2); cursor:pointer; font-size:10px; display:flex; align-items:center; gap:4px; transition:all .1s; }
.dc:hover { border-color:var(--bd2); }
.dc.sel { border-color:var(--acc); background:#eff6ff; }
.dc .dd { width:7px; height:7px; border-radius:50%; }
.mas { display:flex; justify-content:flex-end; gap:6px; margin-top:14px; }
.mb { padding:6px 14px; border-radius:5px; border:1px solid var(--bd); background:var(--p2); color:var(--tx); font-size:11px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all .1s; }
.mb:hover { background:var(--bg); }
.mb.prim { background:var(--acc); border-color:var(--acc); color:#fff; }
.mb.prim:hover { background:#1d4ed8; }
.mb.del { border-color:#fca5a5; color:#dc2626; }
.mb.del:hover { background:#fef2f2; }

/* ── TOOLTIP ── */
.tip { position:fixed; background:#1a2236; border-radius:8px; padding:7px 11px; font-size:11px; color:#e2e8f0; pointer-events:none; z-index:300; display:none; max-width:200px; box-shadow:0 4px 12px rgba(0,0,0,.25); }
.tip .tz { font-weight:600; font-size:12px; }
.tip .te { color:#94a3b8; font-size:10px; margin-top:1px; }
.tip .td { font-size:9px; padding:2px 6px; border-radius:3px; margin-top:4px; display:inline-block; }

/* ── TOAST ── */
#toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(50px); background:#1a2236; color:#e2e8f0; padding:8px 16px; border-radius:8px; font-size:11px; transition:transform .25s; z-index:400; white-space:nowrap; box-shadow:0 4px 12px rgba(0,0,0,.25); }
#toast.show { transform:translateX(-50%) translateY(0); }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--bd); border-radius:3px; }
</style>
</head>

<div class="top">
  <div class="logo">AOCC</div>
  <div class="ftabs">

  </div>
</div>

<div class="tip" id="tip"></div>
<div id="toast"></div>

<script>

  return BOT_START + (vr - TOP_ROWS)*(CH+ROW_GAP);
}

function getRowCols(vr) {
  const max = ROW_MAX_COL[vr] ?? 35;
  const extras = (EXTRA_COLS_MAP[vr]||[]).filter(c=>c<=max);
  const all = [...extras, ...STD_COLS.filter(c=>c<=max)].filter(c=>!SLOT_BLACKLIST.has(`${vr}_${c}`));
  const st = states[floor] || states['6F'];
  const pinned = pinnedSlots[floor] || new Set();
  // Find last occupied OR pinned col

    return st[k] != null || pinned.has(k);
  });
  if (!significant.length) return [];
  const lastSig = Math.max(...significant);
  return all.filter(c => c <= lastSig);
}

let floor = '6F';

function sk(vr,vc){return `${vr}_${vc}`;}

function initStates(){
  states={'6F':{},'4F':{},'10F':{}};
  undoStack={'6F':[],'4F':[],'10F':[]};
  function load(orig, fl){
    Object.entries(orig).forEach(([k,p])=>states[fl][k]=p.new?null:{...p});
    // For 6F, fill all slot keys with null if not in orig
    if(fl==='6F'){
      for(let vr=0;vr<14;vr++){
        getRowCols(vr).forEach(vc=>{
          const k=sk(vr,vc);
          if(!(k in states['6F'])) states['6F'][k]=null;
        });
      }
    }
  }
  load(ORIG_6F,'6F');
  load(ORIG_4F,'4F');
  load(ORIG_10F,'10F');
}

function clone(f){return JSON.parse(JSON.stringify(states[f]));}

function render(){
  const cv=document.getElementById('cv');
  cv.innerHTML='';
  if(floor==='6F') render6F(cv);
  else if(floor==='4F') render4F(cv);
  else render10F(cv);
  buildLegend();
  updateBadge();
  document.getElementById('undoB').disabled=!undoStack[floor].length;
  applyFilter();
}

function render6F(cv){
  cv.style.width=TOTAL_W_6F+'px';
  cv.style.height=TOTAL_H_6F+'px';

  // Full-height vertical aisle lanes
  AISLE_DIVIDERS_6F.forEach(([x1,x2])=>{
    const lane=document.createElement('div');
    lane.style.cssText=`position:absolute;left:${x1}px;top:0;width:${x2-x1}px;height:${TOTAL_H_6F}px;background:#dce1ec;pointer-events:none;z-index:0;`;
    cv.appendChild(lane);
  });
  // Extra wide visible grey aisle between col 32 and col 34
  const extraLane=document.createElement('div');
  extraLane.style.cssText=`position:absolute;left:2194px;top:0;width:22px;height:${TOTAL_H_6F}px;background:#d0d5e2;pointer-events:none;z-index:0;`;
  cv.appendChild(extraLane);

  // Horizontal aisles
  mkAisle(cv,AISLE1_Y,AISLE1_H,'走　道');
  mkAisle(cv,AISLE2_Y,AISLE2_H,'走　道');
  // 門口 label
  const doorEl=document.createElement('div');
  const _dx=COL_X[34], _dy=rowY6F(5);
  doorEl.style.position='absolute';
  doorEl.style.left=_dx+'px';
  doorEl.style.top=_dy+'px';
  doorEl.style.width=CW+'px';
  doorEl.style.height=CH+'px';
  doorEl.style.background='transparent';
  doorEl.style.border='none';
  doorEl.style.borderRadius='8px';
  doorEl.style.color='#1a2236';
  doorEl.style.fontWeight='700';
  doorEl.style.fontSize='13px';
  doorEl.style.zIndex='10';
  doorEl.style.display='flex';
  doorEl.style.alignItems='center';
  doorEl.style.justifyContent='center';
  doorEl.style.textAlign='center';
  doorEl.style.fontFamily='Noto Sans TC,sans-serif';
  doorEl.textContent='門口';
  cv.appendChild(doorEl);
  // Ensure canvas is wide enough to show door
  cv.style.width=Math.max(parseInt(cv.style.width)||0, _dx+CW+20)+'px';

  for(let vr=0;vr<14;vr++){
    const y=rowY6F(vr);
    const dept=ROW_DEPTS[vr];


    const cols=getRowCols(vr);
    cols.forEach(vc=>{
      const k=sk(vr,vc);
      const isPillar=PILLARS_6F[k];
      const person=states['6F'][k];
      const x=COL_X[vc];
      if(x===undefined)return;
      if(isPillar) mkPillar(cv,x,y);
      else if(person) mkSeat(cv,k,x,y,person,'6F');
      else mkEmpty(cv,k,x,y,'6F');
    });
  }
}

function render4F(cv){
  // Simple grid: 4 cols (0-3), 4 rows
  const CW4=110, CH4=65, G4=8;
  const rows4=4, cols4=4;
  cv.style.width=(cols4*(CW4+G4)+40)+'px';
  cv.style.height=(rows4*(CH4+G4)+40)+'px';

  // Title
  const t=document.createElement('div');
  t.style.cssText='position:absolute;left:0;top:0;font-size:11px;color:var(--tx2);font-family:Space Mono,monospace;padding:4px 8px;';
  t.textContent='4F';
  cv.appendChild(t);

  const startY=28;
  for(let vr=0;vr<rows4;vr++){
    for(let vc=0;vc<cols4;vc++){
      const k=sk(vr,vc);
      const x=vc*(CW4+G4);
      const y=startY+vr*(CH4+G4);
      const person=states['4F'][k];
      if(person) mkSeat(cv,k,x,y,person,'4F',CW4,CH4);
      else mkEmpty(cv,k,x,y,'4F',CW4,CH4);
    }
  }
}

const SKIP_10F = new Set(['4_0','4_1','5_0','5_1','6_0','6_1','7_0','7_1','0_0','0_1']);
function render10F(cv){
  const CW10=110, CH10=65, G10=8;
  cv.style.width=(4*(CW10+G10)+40)+'px';
  cv.style.height=(8*(CH10+G10)+20)+'px';
  for(let vr=0;vr<8;vr++){
    for(let vc=0;vc<4;vc++){
      const k=sk(vr,vc);
      if(SKIP_10F.has(k)) continue;
      const x=vc*(CW10+G10);
      const y=vr*(CH10+G10);
      const person=states['10F'][k];
      if(person) mkSeat(cv,k,x,y,person,'10F',CW10,CH10);
      else mkEmpty(cv,k,x,y,'10F',CW10,CH10);
    }
  }
}

function mkAisle(cv,top,h,text){
  const el=document.createElement('div');
  el.className='aisle-band'; el.style.zIndex='3';
  el.style.cssText=`top:${top}px;height:${h}px;`;
  el.innerHTML=`<span>${text}</span>`;
  cv.appendChild(el);
}

function mkPillar(cv,x,y){
  const el=document.createElement('div');
  el.className='pillar';
  el.style.cssText=`left:${x}px;top:${y}px;width:${CW}px;height:${CH}px;`;
  el.innerHTML='<span>柱子</span>';
  cv.appendChild(el);
}

function mkSeat(cv,key,x,y,p,fl,w,h){
  w=w||CW; h=h||CH;
  // Special: 許萬寶 seat spans 2 rows vertically
  if(key==='4_1' && fl==='6F') h=126;
  const el=document.createElement('div');
  const isNew=p.new;
  el.className='seat'+(isNew?' new-hire':'');
  el.id='s-'+key; el.dataset.key=key; el.dataset.fl=fl;
  const color=DC[p.dept]||'#94a3b8';
  const bg=DB[p.dept]||'#f8fafc';
  el.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:${isNew?'#fafbfe':bg};z-index:1;`;
  el.innerHTML=`<div class="bar" style="background:${color}"></div><div class="zh">${p.zh||p.en}</div>${p.zh&&p.en?`<div class="en">${p.en}</div>`:''}<div class="ebtn" onclick="openEdit('${key}','${fl}',event)">✎</div>`;
  el.draggable=true;
  el.addEventListener('dragstart',onDS); el.addEventListener('dragend',onDE);
  el.addEventListener('mouseenter',showTip); el.addEventListener('mouseleave',hideTip);
  el.addEventListener('dragover',onDO); el.addEventListener('dragleave',onDL);
  el.addEventListener('drop',onDrop);
  cv.appendChild(el);
}

function mkEmpty(cv,key,x,y,fl,w,h){
  w=w||CW; h=h||CH;
  const el=document.createElement('div');
  el.className='eslot'; el.id='s-'+key; el.dataset.key=key; el.dataset.fl=fl;
  el.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:1;cursor:pointer;`;
  el.innerHTML='<div class="ep">+</div><div class="el">新增</div>';
  el.addEventListener('click', ()=>openEdit(key,fl,{stopPropagation:()=>{},preventDefault:()=>{}}));
  el.addEventListener('dragover',onDO); el.addEventListener('dragleave',onDL); el.addEventListener('drop',onDrop);
  cv.appendChild(el);
}

// ═══════════════════════════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════════════════════════
function onDS(e){ dragId=e.currentTarget.dataset.key; dragFloor=e.currentTarget.dataset.fl; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onDE(e){ e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over')); dragId=null; }
function onDO(e){ e.preventDefault(); if(e.currentTarget.dataset.key!==dragId) e.currentTarget.classList.add('drag-over'); }
function onDL(e){ e.currentTarget.classList.remove('drag-over'); }
function onDrop(e){
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  const toKey=e.currentTarget.dataset.key, fl=e.currentTarget.dataset.fl;
  if(!dragId||dragId===toKey) return;
  const src=states[fl][dragId]; if(!src) return;
  undoStack[fl].push(clone(fl));
  if(undoStack[fl].length>60) undoStack[fl].shift();
  const dst=states[fl][toKey];
  if(!dst){
    states[fl][toKey]=src; states[fl][dragId]=null;
    pinnedSlots[fl].add(dragId); // pin original slot as empty
    toast(`→ ${src.zh||src.en}`);
  } else {
    states[fl][dragId]=dst; states[fl][toKey]=src;
    toast(`⇄ ${src.zh||src.en} ↔ ${dst.zh||dst.en}`);
  }
  save(); render();
}

// ═══════════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════════
const tipEl=document.getElementById('tip');
function showTip(e){
  const k=e.currentTarget.dataset.key,fl=e.currentTarget.dataset.fl;
  const p=states[fl][k]; if(!p) return;
  const c=DC[p.dept]||'#94a3b8';
  tipEl.innerHTML=`<div class="tz">${p.zh||p.en}</div>${p.zh&&p.en?`<div class="te">${p.en}</div>`:''}<span class="td" style="background:${c}22;color:${c}">${p.dept}</span>`;
  tipEl.style.display='block'; moveTip(e);
}
function hideTip(){ tipEl.style.display='none'; }
document.addEventListener('mousemove',e=>{if(tipEl.style.display==='block') moveTip(e);});
function moveTip(e){ let x=e.clientX+12,y=e.clientY-6; if(x+210>window.innerWidth) x=e.clientX-214; if(y+80>window.innerHeight) y=e.clientY-80; tipEl.style.left=x+'px'; tipEl.style.top=y+'px'; }

// ═══════════════════════════════════════════════════════════
// LEGEND + BADGE + FILTER
// ═══════════════════════════════════════════════════════════
function buildLegend(){
  const bar=document.getElementById('legbar');
  bar.innerHTML='<span class="ll">部門：</span>';
  const counts={};
  Object.values(states[floor]).forEach(p=>{if(p) counts[p.dept]=(counts[p.dept]||0)+1;});
  [{k:'全部',color:'#64748b'},...DEPTS.filter(d=>counts[d.k])].forEach(d=>{
    const chip=document.createElement('div');
    chip.className='lchip'+(filterDept===d.k||(d.k==='全部'&&filterDept==='all')?' on':'');
    chip.innerHTML=`<span class="dot" style="background:${d.color}"></span>${d.k}${counts[d.k]?` <span class="n">${counts[d.k]}</span>`:''}`;
    chip.onclick=()=>{filterDept=d.k==='全部'?'all':d.k; render();};
    bar.appendChild(chip);
  });
}
function updateBadge(){
  const total=Object.values(states[floor]).filter(Boolean).length;
  const empty=Object.values(states[floor]).filter(p=>p===null).length;
  document.getElementById('bdg').textContent=`${total} 人　${empty} 空位`;
}
function applyFilter(){
  document.querySelectorAll('.seat,.eslot').forEach(el=>{
    const k=el.dataset.key,fl=el.dataset.fl;
    if(fl!==floor){return;}
    const p=states[fl][k];
    if(!p){el.classList.remove('hl','dim');return;}
    if(srchQ){const h=(p.zh+p.en+p.dept).toLowerCase(); el.classList.toggle('hl',h.includes(srchQ)); el.classList.toggle('dim',!h.includes(srchQ));}
    else if(filterDept!=='all'){el.classList.toggle('hl',p.dept===filterDept); el.classList.toggle('dim',p.dept!==filterDept);}
    else{el.classList.remove('hl','dim');}
  });
}
function doSearch(v){srchQ=v.trim().toLowerCase(); applyFilter();}

// ═══════════════════════════════════════════════════════════
// EDIT MODAL
// ═══════════════════════════════════════════════════════════
function openEdit(key,fl,e){ e.stopPropagation(); e.preventDefault(); editKey=key; editFloor=fl; const p=states[fl][key]; document.querySelector('#editOv .modal h3').textContent=p?'✏️ 編輯座位':'➕ 新增人員'; document.getElementById('mZh').value=p?.zh||''; document.getElementById('mEn').value=p?.en||''; const dcs=document.getElementById('dcs'); dcs.innerHTML=''; DEPTS.forEach(d=>{const div=document.createElement('div'); div.className='dc'+(p?.dept===d.k?' sel':''); div.innerHTML=`<span class="dd" style="background:${d.color}"></span>${d.k}`; div.onclick=()=>{dcs.querySelectorAll('.dc').forEach(x=>x.classList.remove('sel')); div.classList.add('sel');}; dcs.appendChild(div);}); document.getElementById('editOv').classList.add('open'); }
function closeModal(e){ if(e&&e.target!==document.getElementById('editOv'))return; document.getElementById('editOv').classList.remove('open'); editKey=null; }
function saveModal(){ if(!editKey)return; const zh=document.getElementById('mZh').value.trim(),en=document.getElementById('mEn').value.trim(); const sel=document.getElementById('dcs').querySelector('.sel'); const dept=sel?.textContent.trim()||'未指定'; if(!zh&&!en){toast('⚠ 請填入姓名');return;} undoStack[editFloor].push(clone(editFloor)); states[editFloor][editKey]={zh,en,dept}; document.getElementById('editOv').classList.remove('open'); editKey=null; save(); render(); toast('✓ 已儲存'); }
function clearSlot(){ if(!editKey||!confirm('確定清空？'))return; undoStack[editFloor].push(clone(editFloor)); states[editFloor][editKey]=null; document.getElementById('editOv').classList.remove('open'); editKey=null; save(); render(); toast('✓ 已清空'); }

// ═══════════════════════════════════════════════════════════
// FLOOR / UNDO / RESET / ZOOM
// ═══════════════════════════════════════════════════════════
function switchFloor(f,btn){ floor=f; document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on')); btn.classList.add('on'); document.getElementById('srch').value=''; srchQ=''; filterDept='all'; render(); }
function doUndo(){ const st=undoStack[floor]; if(!st.length)return; states[floor]=st.pop(); save(); render(); toast('↩ 復原'); }
function doReset(){ if(!confirm(`還原 ${floor} 到原始座位表？`))return; if(pinnedSlots[floor]) pinnedSlots[floor].clear(); undoStack[floor].push(clone(floor)); initStates(); save(); render(); toast('⟳ 重置完成'); }
function setZoom(v){ zoom=+v; document.getElementById('zl').textContent=v+'%'; document.getElementById('wrap').style.transform=`scale(${v/100})`; }

// ═══════════════════════════════════════════════════════════
// STORAGE + KEYBOARD
// ═══════════════════════════════════════════════════════════
let toastT;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2200); }
function save(){ try{localStorage.setItem('aocc_v46',JSON.stringify(states));}catch(e){} }
function load(){ try{const s=localStorage.getItem('aocc_v46'); if(s) states=JSON.parse(s);}catch(e){} }
document.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!document.getElementById('editOv').classList.contains('open')){e.preventDefault();doUndo();} if(e.key==='Escape')document.getElementById('editOv').classList.remove('open'); });

initStates(); load(); render(); setZoom(zoom);
setInterval(save,15000); window.addEventListener('beforeunload',save);
</script>
</body>
